{% extends 'twitter/base.html' %}

{% block content %}
<div style="display: flex; min-height: 80vh; flex-direction: column; justify-content: center; align-items: center; background-color: #000000;">
    <div style="width: 100%; max-width: 400px; background-color: #000000; padding: 40px; border-radius: 16px; border: 1px solid #2f3336;">
        <!-- Logo do X improvisado por texto moderno -->
        <h1 style="font-size: 40px; font-weight: 900; text-align: center; margin-bottom: 30px; color: #e7e9ea; font-family: sans-serif;">X</h1>
        <h2 style="font-size: 24px; font-weight: 700; text-align: left; margin-bottom: 25px; color: #e7e9ea;">Entrar no X</h2>
        
        {% if error %}
        <p style="color: #f4212e; font-size: 14px; margin-bottom: 15px; text-align: center;">{{ error }}</p>
        {% endif %}

        <form method="POST" style="display: flex; flex-direction: column; gap: 20px;">
            {% csrf_token %}
            <div>
                <label style="display: block; font-size: 13px; color: #71767b; margin-bottom: 5px;">Usuário</label>
                <input type="text" name="username" required style="width: 100%; background-color: #000000; color: #e7e9ea; border: 1px solid #2f3336; border-radius: 4px; padding: 12px; font-size: 16px; outline: none; transition: 0.2s;" onfocus="this.style.borderColor='#1da1f2'">
            </div>
            <div>
                <label style="display: block; font-size: 13px; color: #71767b; margin-bottom: 5px;">Senha</label>
                <input type="password" name="password" required style="width: 100%; background-color: #000000; color: #e7e9ea; border: 1px solid #2f3336; border-radius: 4px; padding: 12px; font-size: 16px; outline: none; transition: 0.2s;" onfocus="this.style.borderColor='#1da1f2'">
            </div>
            
            <button type="submit" class="btn-blue" style="float: none; width: 100%; padding: 12px; margin-top: 10px; font-size: 16px;">Avançar</button>
        </form>
        
        <p style="margin-top: 40px; text-align: left; font-size: 15px; color: #71767b;">
            Não tem uma conta? <a href="{% url 'register' %}" style="color: #1da1f2; text-decoration: none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">Inscreva-se</a>
        </p>
    </div>
</div>
{% endblock %}
