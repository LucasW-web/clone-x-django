<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        /* Fundo 100% Preto do X */
        body { background-color: #000000; color: #e7e9ea; min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; display: flex; gap: 30px; }
        /* Bordas finas e discretas simulando o feed atual */
        .sidebar { flex: 1; background-color: #000000; padding: 20px; border-radius: 16px; height: fit-content; border: 1px solid #2f3336; }
        .main-content { flex: 2; display: flex; flex-direction: column; gap: 0px; border-left: 1px solid #2f3336; border-right: 1px solid #2f3336; padding: 0 20px; }
        .tweet-box { background-color: #000000; padding: 15px 0; border-bottom: 1px solid #2f3336; }
        textarea { width: 100%; height: 90px; background-color: #000000; color: #e7e9ea; border: none; padding: 12px 0; resize: none; font-size: 19px; outline: none; margin-bottom: 10px; }
        
        /* Botão de Postar Branco com texto Preto do X */
        .btn-blue { background-color: #eff3f4; color: #0f1419; border: none; padding: 10px 24px; font-weight: bold; border-radius: 9999px; cursor: pointer; float: right; font-size: 15px; transition: 0.2s; }
        .btn-blue:hover { background-color: #d7dbdc; }
        
        .btn-red { background-color: #f4212e; color: white; border: none; padding: 8px 16px; font-weight: bold; border-radius: 9999px; cursor: pointer; display: block; text-align: center; text-decoration: none; font-size: 14px; margin-top: 15px; transition: 0.2s; }
        .btn-red:hover { background-color: #dc1e29; }
        
        /* Posts integrados diretamente ao plano de fundo */
        .tweet { background-color: #000000; padding: 15px 0; border-bottom: 1px solid #2f3336; }
        .tweet-header { display: flex; gap: 8px; margin-bottom: 4px; align-items: center; }
        .username { font-weight: bold; color: #e7e9ea; text-decoration: none; font-size: 15px; }
        .username:hover { text-decoration: underline; }
        .handle { color: #71767b; font-size: 15px; }
        .date { color: #71767b; font-size: 15px; }
        
        /* Botões de Seguir do X */
        .btn-follow { background-color: #eff3f4; color: #0f1419; border: none; padding: 6px 16px; font-weight: bold; border-radius: 9999px; cursor: pointer; font-size: 14px; transition: 0.2s; text-decoration: none; }
        .btn-follow:hover { background-color: #d7dbdc; }
        .btn-unfollow { background-color: transparent; color: #e7e9ea; border: 1px solid #536471; padding: 6px 16px; font-weight: bold; border-radius: 9999px; cursor: pointer; font-size: 14px; transition: 0.2s; text-decoration: none; }
        .btn-unfollow:hover { background-color: rgba(244, 33, 46, 0.1); color: #f4212e; border-color: #f4212e; }
        
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; }
        .empty-feed { text-align: center; color: #71767b; padding: 40px 20px; font-size: 15px; }
    </style>
</head>
<body>
    {% block content %}
    {% endblock %}
</body>
</html>
